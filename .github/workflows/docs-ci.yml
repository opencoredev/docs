name: Docs CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate Mintlify docs
        run: bunx @mintlify/cli validate

      - name: Check broken links
        run: bunx @mintlify/cli broken-links
